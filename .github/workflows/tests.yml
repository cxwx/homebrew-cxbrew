name: CI
on:
  push:
    branches: master
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-homebrew-${{ hashFiles('Formula/**/*.rb') }}
          restore-keys: ${{ runner.os }}-homebrew-

      - name: Detect changed formulas
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'Formula/**/*.rb')
          else
            files=$(git diff --name-only HEAD~1 -- 'Formula/**/*.rb')
          fi
          if [ -z "$files" ]; then
            echo "formulas=" >> "$GITHUB_OUTPUT"
          else
            names=$(echo "$files" | sed 's|.*/||;s|\.rb$||' | tr '\n' ' ')
            echo "formulas=$names" >> "$GITHUB_OUTPUT"
          fi

      - name: Install changed formulas
        if: steps.changed.outputs.formulas != ''
        run: |
          for name in ${{ steps.changed.outputs.formulas }}; do
            echo "::group::brew install $name"
            brew install --build-from-source cxwx/cxbrew/"$name"
            echo "::endgroup::"
          done

      - name: Upload bottles
        if: always() && steps.changed.outputs.formulas != ''
        uses: actions/upload-artifact@v4
        with:
          name: bottles-${{ matrix.os }}
          path: '*.bottle.*'
