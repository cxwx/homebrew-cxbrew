name: Livecheck

on:
  schedule:
    - cron: "23 8 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  livecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run brew livecheck
        id: livecheck
        run: |
          brew livecheck --tap cxwx/homebrew-cxbrew --json --newer-only 2>/dev/null > livecheck.json || true
          if ! jq empty livecheck.json 2>/dev/null; then
            echo '[]' > livecheck.json
          fi
          count=$(jq length livecheck.json)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count formula(s) with updates"

      - name: Ensure livecheck label exists
        if: steps.livecheck.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create livecheck --repo "$GITHUB_REPOSITORY" \
            --description "New version detected by brew livecheck" \
            --color "0075ca" 2>/dev/null || true

      - name: Create issues and PRs for outdated formulas
        if: steps.livecheck.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "GH_TOKEN prefix: ${GH_TOKEN:0:10}..."
          gh auth status
          jq -c '.[]' livecheck.json | while read -r item; do
            name=$(echo "$item" | jq -r '.formula // .name')
            current=$(echo "$item" | jq -r '.version.current // "unknown"')
            latest=$(echo "$item" | jq -r '.version.latest // "unknown"')
            status=$(echo "$item" | jq -r '.status // empty')

            # Skip formulas with errors or unknown versions
            if [[ "$status" == "error" || "$current" == "unknown" || "$latest" == "unknown" ]]; then
              echo "Skipping $name: status=$status current=$current latest=$latest"
              continue
            fi

            # Skip if version format changed (e.g. semver → date-based)
            semver_re='^[0-9]+\.[0-9]+'
            date_re='^[0-9]{4}[_]?[0-9]{2}[_]?[0-9]{2}'
            if [[ "$current" =~ $semver_re && "$latest" =~ $date_re ]] || \
               [[ "$current" =~ $date_re && "$latest" =~ $semver_re ]]; then
              echo "Skipping $name: version scheme changed ($current → $latest)"
              continue
            fi

            info_json=$(brew info --json=v2 "cxwx/cxbrew/${name}" 2>/dev/null)
            upstream=$(echo "$info_json" | jq -r '.formulae[0].homepage // empty')

            # Skip formulas without a GitHub upstream URL
            if [[ "$upstream" != *"github.com"* ]]; then
              echo "Skipping $name: non-GitHub upstream ($upstream)"
              continue
            fi

            # Extract owner/repo from homepage URL
            gh_repo=$(echo "$upstream" | sed -E 's|https?://github.com/||; s|/$||')

            # --- Create issue ---
            title="⬆️ ${name}: ${current} → ${latest}"

            existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "\"$title\"" --json number --jq 'length')
            if [ "$existing" != "0" ]; then
              echo "Issue already exists for $name, skipping"
              continue
            fi

            body="## New version available

          | | |
          |---|---|
          | **Formula** | \`${name}\` |
          | **Current** | ${current} |
          | **Latest** | ${latest} |
          | **Upstream** | ${upstream:-N/A} |"

            issue_url=$(gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body "$body" \
              --label "livecheck")
            issue_number=$(basename "$issue_url")
            echo "Created issue #${issue_number} for ${name}"

            # --- Create PR via brew bump-formula-pr ---
            # Construct archive URL (avoid API tarball_url which breaks livecheck)
            tarball_url="https://github.com/${gh_repo}/archive/refs/tags/v${latest}.tar.gz"

            sha256=$(curl -sL "$tarball_url" | sha256sum | cut -d' ' -f1)

            if [[ -z "$sha256" ]]; then
              echo "Failed to get SHA256 for $name, skipping PR"
              continue
            fi

            # Delete existing bump branch if present
            branch_name="bump-${name}-${latest}"
            git push origin --delete "$branch_name" 2>/dev/null || true

            brew bump-formula-pr --no-audit --no-browse --no-fork \
              --message "Closes #${issue_number}" \
              --url="$tarball_url" --sha256="$sha256" \
              "cxwx/cxbrew/${name}" || echo "bump-formula-pr failed for $name"
          done
