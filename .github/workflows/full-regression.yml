name: Full Regression Test

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose output'
        type: boolean
        default: false
        required: false

jobs:
  full-regression:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-${{ matrix.os }}-fullcache
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-

      - name: List all formulas
        id: list
        run: |
          formulas=$(find Formula -name '*.rb' -not -path '*/archived*' | while read f; do
            # Only include formulas with a stable url (skip HEAD-only formulas)
            if grep -q '^ *url ' "$f" 2>/dev/null; then
              basename "$f" .rb
            fi
          done)
          total=$(echo "$formulas" | grep -c .)
          echo "$formulas" > all_formulas.txt
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "Found $total formula(s) (excluding HEAD-only)"

      - name: Audit all formulas
        run: |
          > /tmp/audit_failures.txt
          while IFS= read -r name; do
            if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
              echo "::group::audit: $name"
            fi

            if brew audit --online "cxwx/cxbrew/$name" 2>&1; then
              :
            else
              echo "AUDIT_FAIL: $name" >> /tmp/audit_failures.txt
            fi

            if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
              echo "::endgroup::"
            fi
          done < all_formulas.txt

          if [ -s /tmp/audit_failures.txt ]; then
            echo "Audit issues detected on ${{ matrix.os }}:"
            cat /tmp/audit_failures.txt
          else
            echo "All audits passed on ${{ matrix.os }}"
          fi

      - name: Install all formulas (dry-run)
        run: |
          > /tmp/install_failures.txt
          while IFS= read -r name; do
            if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
              echo "::group::install: $name"
            fi

            if brew install --dry-run "cxwx/cxbrew/$name" 2>&1; then
              :
            else
              echo "INSTALL_FAIL: $name" >> /tmp/install_failures.txt
            fi

            if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
              echo "::endgroup::"
            fi
          done < all_formulas.txt

          if [ -s /tmp/install_failures.txt ]; then
            echo "Install issues detected on ${{ matrix.os }}:"
            cat /tmp/install_failures.txt
          else
            echo "All installs passed on ${{ matrix.os }}"
          fi

      - name: Summary
        if: always()
        run: |
          echo "====== Full Regression Summary (${{ matrix.os }}) ======"
          if [ -s /tmp/audit_failures.txt ]; then
            echo "Audit issues found:"
            cat /tmp/audit_failures.txt
          else
            echo "All audits OK"
          fi
          if [ -s /tmp/install_failures.txt ]; then
            echo "Install issues found:"
            cat /tmp/install_failures.txt
          else
            echo "All installs OK"
          fi
