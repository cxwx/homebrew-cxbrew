name: Full Regression Test

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose output'
        type: boolean
        default: false
        required: false

jobs:
  full-regression:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-${{ matrix.os }}-fullcache
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-

      - name: List all formulas
        id: list
        run: |
          formulas=$(find Formula -name '*.rb' -not -path '*/archived*' | while read f; do basename "$f" .rb; done)
          total=$(echo "$formulas" | wc -l)
          echo "$formulas" > all_formulas.txt
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "Found $total formula(s)"

      - name: Audit all formulas
        run: |
          echo "=== Starting audit on ${{ matrix.os }} ==="
          pass=0
          fail=0
          while IFS= read -r name; do
            if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
              echo "::group::audit: $name"
            fi

            if brew audit --online "cxwx/cxbrew/$name" 2>&1; then
              :
            else
              echo "AUDIT_FAIL: $name" >> /tmp/audit_failures.txt
              echo "AUDIT_FAIL: $name" >> /tmp/summary.txt
              fail=$((fail + 1))
            fi

            if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
              echo "::endgroup::"
            fi
            pass=$((pass + 1))
            echo "Progress: $pass/$total"
          done < all_formulas.txt

          echo "=== Audit Results: pass=$pass fail=$fail ===="
          if [ -s /tmp/audit_failures.txt ]; then
            echo "Failed audits on ${{ matrix.os }}:"
            cat /tmp/audit_failures.txt
          fi

      - name: Install all formulas (dry-run)
        run: |
          pass=0
          fail=0
          while IFS= read -r name; do
            if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
              echo "::group::install: $name"
            fi

            if brew install --dry-run "cxwx/cxbrew/$name" 2>&1; then
              :
            else
              echo "INSTALL_FAIL: $name" >> /tmp/install_failures.txt
              fail=$((fail + 1))
            fi

            if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
              echo "::endgroup::"
            fi
            pass=$((pass + 1))
            echo "Progress: $pass/$total"
          done < all_formulas.txt

          echo "=== Install Results: pass=$pass fail=$fail ===="
          if [ -s /tmp/install_failures.txt ]; then
            echo "Failed installs on ${{ matrix.os }}:"
            cat /tmp/install_failures.txt
          fi

      - name: Summary
        if: always()
        run: |
          echo "=== Full Regression Summary (${{ matrix.os }}) ==="
          if [ -s /tmp/audit_failures.txt ]; then
            echo "Audit failures:"
            cat /tmp/audit_failures.txt
          else
            echo "All audits passed"
          fi
          if [ -s /tmp/install_failures.txt ]; then
            echo "Install failures:"
            cat /tmp/install_failures.txt
          else
            echo "All installs passed"
          fi
